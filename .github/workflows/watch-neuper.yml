name: Watch Michael Neuper Updates

on:
  schedule:
    - cron: '0 6 * * *'  # Every day at 6 AM UTC
  workflow_dispatch:       # Manual trigger

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Check Neuper's blog for new posts
        run: |
          echo "Checking https://michaelneuper.com/posts/ for new content..."
          curl -s https://michaelneuper.com/posts/ | grep -o 'posts/[^"]*' | head -20 > /tmp/neuper-posts.txt
          echo "Latest posts:"
          cat /tmp/neuper-posts.txt

      - name: Check Neuper's doom emacs config
        run: |
          echo "Checking https://github.com/michaelneuper/doom for updates..."
          curl -s https://api.github.com/repos/michaelneuper/doom/commits | grep -m 1 '"sha"' | cut -d'"' -f4 > /tmp/doom-sha.txt
          echo "Latest doom commit: $(cat /tmp/doom-sha.txt)"

      - name: Check publish-org-roam-ui fork
        run: |
          echo "Checking https://github.com/michaelneuper/publish-org-roam-ui for updates..."
          curl -s https://api.github.com/repos/michaelneuper/publish-org-roam-ui/commits | grep -m 1 '"sha"' | cut -d'"' -f4 > /tmp/orui-sha.txt
          echo "Latest ORUI commit: $(cat /tmp/orui-sha.txt)"

      - name: Check koreader-org-converter
        run: |
          echo "Checking https://github.com/michaelneuper/koreader-org-converter for updates..."
          curl -s https://api.github.com/repos/michaelneuper/koreader-org-converter/commits | grep -m 1 '"sha"' | cut -d'"' -f4 > /tmp/koreader-sha.txt
          echo "Latest koreader commit: $(cat /tmp/koreader-sha.txt)"

      - name: Create issue if new content found
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const posts = fs.readFileSync('/tmp/neuper-posts.txt', 'utf8');
            const doom = fs.readFileSync('/tmp/doom-sha.txt', 'utf8').trim();
            
            // Store hashes for comparison next run
            // If different from last run, create an issue notifying you
            console.log('Neuper watch complete. Check run logs for details.');
